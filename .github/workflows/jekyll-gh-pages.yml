# Numbers Lore Viewer（index.html + assets/ + 生の Markdown）を静的サイトとして GitHub Pages にデプロイする。
# 注意: Jekyll ではビルドしない。ビューアーは .md をそのまま fetch して描画するため、
# Jekyll を通すと .md が .html に変換されて動作しなくなる（過去には Wikipedia 引用内の
# `{{` が Liquid 構文エラーを起こしビルドが失敗していた）。
name: Deploy static site (Numbers Lore Viewer) to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job（静的コピーのみ。Jekyll は使わない）
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '_site' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.vscode' \
            --exclude '.private' \
            --exclude '.venv' \
            --exclude '_template' \
            --exclude '_wip' \
            --exclude 'tools' \
            --exclude 'AGENTS.md' \
            --exclude 'CLAUDE.md' \
            ./ _site/
          touch _site/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
